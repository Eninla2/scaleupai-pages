<!DOCTYPE html>

<head>

<title>ScaleUp AI</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0f0f13; --card:#1a1a24; --card2:#1e1e2e; --border:#2a2a38;
  --accent:#FF2D55; --accent2:#7B2FFF; --gold:#F5A623; --green:#00C853;
  --text:#f0f0f0; --muted:#888; --tag-bg:rgba(255,45,85,.15); --tag-color:#FF2D55;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,15,19,.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex}
.nav-btn{flex:1;padding:10px 0 14px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.04em;transition:color .2s}
.nav-btn .ni{font-size:20px}
.nav-btn.active{color:var(--accent)}
.nav-btn.earn-btn.active,.nav-btn.rewards-btn.active{color:var(--gold)}

/* ── Header ── */
.header{position:sticky;top:0;z-index:50;background:rgba(15,15,19,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.header-logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:17px;font-weight:700;letter-spacing:-.02em}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.coins-badge{display:flex;align-items:center;gap:5px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);border-radius:20px;padding:5px 12px;cursor:pointer}
.coins-icon{font-size:14px}
.coins-val{font-size:13px;font-weight:800;color:var(--gold)}

/* ── Pages ── */
.page{display:none;padding-bottom:80px}
.page.active{display:block}

/* ── Category pills ── */
.cats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.cats::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);border:1px solid var(--border);transition:all .2s}
.cat.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Daily check-in strip ── */
.checkin-strip{margin:12px 16px 0;background:linear-gradient(135deg,rgba(245,166,35,.12),rgba(123,47,255,.12));border:1px solid rgba(245,166,35,.3);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.ci-left{flex:1}
.ci-title{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:2px}
.ci-sub{font-size:11px;color:var(--muted)}
.ci-streak{font-size:11px;color:var(--gold);margin-top:3px;font-weight:700}
.ci-btn{background:var(--gold);color:#000;border:none;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:800;cursor:pointer;flex-shrink:0}
.ci-btn:disabled{background:rgba(245,166,35,.3);color:rgba(245,166,35,.6);cursor:default}

/* ── Article feed ── */
.feed{padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;animation:fadeIn .3s ease}
.card:active{transform:scale(.98)}
.card.featured{border-color:rgba(255,45,85,.4)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-img{width:100%;height:180px;object-fit:cover;display:block;background:var(--border)}
.card-body{padding:14px}
.card-tag{display:inline-block;background:var(--tag-bg);color:var(--tag-color);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.card-title{font-size:16px;font-weight:700;line-height:1.35;margin-bottom:8px;letter-spacing:-.01em}
.card-excerpt{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;justify-content:space-between}
.card-date{font-size:11px;color:var(--muted)}
.read-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}

/* ── Coin toast ── */
.coin-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(245,166,35,.95);color:#000;font-size:13px;font-weight:800;padding:8px 18px;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.coin-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Promo card in feed ── */
.promo-card{background:linear-gradient(135deg,rgba(245,166,35,.12),rgba(123,47,255,.12));border:1px solid rgba(245,166,35,.35);border-radius:16px;padding:16px;animation:fadeIn .3s ease}
.promo-card .pc-badge{display:inline-block;background:var(--gold);color:#000;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:10px}
.promo-card .pc-title{font-size:15px;font-weight:800;margin-bottom:6px;line-height:1.3}
.promo-card .pc-sub{font-size:12px;color:rgba(240,240,240,.7);margin-bottom:12px;line-height:1.5}
.promo-card .pc-btn{display:inline-block;background:var(--gold);color:#000;font-size:13px;font-weight:800;padding:9px 20px;border-radius:20px;border:none;cursor:pointer}

/* ── Earn page ── */
.earn-header{padding:20px 16px 4px}
.earn-header h2{font-size:20px;font-weight:800;letter-spacing:-.02em}
.earn-header p{font-size:13px;color:var(--muted);margin-top:4px}
.earn-feed{padding:12px 16px;display:flex;flex-direction:column;gap:14px}
.offer-card{border-radius:18px;overflow:hidden;animation:fadeIn .3s ease}
.offer-card.course{background:linear-gradient(145deg,#1a1030,#16102a);border:1px solid rgba(123,47,255,.4)}
.offer-card.affiliate{background:linear-gradient(145deg,#0f1a0f,#121e12);border:1px solid rgba(0,200,83,.35)}
.offer-card.tool{background:linear-gradient(145deg,#0f1520,#121822);border:1px solid rgba(41,182,246,.35)}
.oc-top{padding:18px 18px 0}
.oc-badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:4px;margin-bottom:10px}
.course .oc-badge{background:rgba(123,47,255,.25);color:#a97cff}
.affiliate .oc-badge{background:rgba(0,200,83,.2);color:#00C853}
.tool .oc-badge{background:rgba(41,182,246,.2);color:#29B6F6}
.oc-title{font-size:18px;font-weight:800;line-height:1.25;letter-spacing:-.02em;margin-bottom:8px}
.oc-body{font-size:13px;color:rgba(240,240,240,.75);line-height:1.65;margin-bottom:12px}
.oc-perks{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.oc-perk{font-size:12px;color:rgba(240,240,240,.8);display:flex;align-items:flex-start;gap:6px}
.oc-perk span{color:var(--green)}
.oc-price{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.price-tag{font-size:14px;font-weight:800;padding:5px 12px;border-radius:8px}
.course .price-tag{background:rgba(123,47,255,.2);color:#c4a2ff}
.affiliate .price-tag{background:rgba(0,200,83,.15);color:#00C853}
.oc-divider{height:1px;background:rgba(255,255,255,.07);margin:0 18px}
.oc-bottom{padding:16px 18px 18px}
.oc-cta{display:block;text-align:center;font-size:15px;font-weight:800;padding:13px;border-radius:12px;border:none;cursor:pointer;width:100%;text-decoration:none}
.course .oc-cta{background:linear-gradient(90deg,#7B2FFF,#a855f7);color:#fff}
.affiliate .oc-cta{background:linear-gradient(90deg,#00C853,#00e676);color:#000}
.tool .oc-cta{background:linear-gradient(90deg,#0288d1,#29B6F6);color:#fff}

/* ── Rewards page ── */
.rewards-page{padding:0 0 80px}
.rw-hero{padding:20px 16px 16px;background:linear-gradient(160deg,rgba(123,47,255,.15),rgba(245,166,35,.08))}
.rw-coins-display{font-size:44px;font-weight:900;color:var(--gold);letter-spacing:-.03em;line-height:1}
.rw-coins-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px;margin-bottom:14px}
.rw-progress-wrap{background:var(--border);border-radius:8px;height:10px;overflow:hidden;margin-bottom:6px}
.rw-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent2),var(--gold));border-radius:8px;transition:width .5s ease}
.rw-progress-label{font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
.rw-section{padding:16px 16px 0}
.rw-section-title{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.rw-tasks{display:flex;flex-direction:column;gap:10px}
.rw-task{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.rw-task.done{opacity:.5}
.rw-task-icon{font-size:22px;flex-shrink:0}
.rw-task-info{flex:1}
.rw-task-title{font-size:14px;font-weight:700;margin-bottom:2px}
.rw-task-desc{font-size:12px;color:var(--muted)}
.rw-task-coins{font-size:13px;font-weight:800;color:var(--gold);flex-shrink:0}

/* ── Tubestack reward card ── */
.tube-card{background:linear-gradient(145deg,#0a1628,#0d1f3c);border:2px solid rgba(41,182,246,.5);border-radius:18px;overflow:hidden;margin:12px 16px;animation:fadeIn .3s ease}
.tube-locked{padding:20px;text-align:center}
.tube-lock-icon{font-size:40px;margin-bottom:12px}
.tube-lock-title{font-size:17px;font-weight:800;margin-bottom:6px;background:linear-gradient(90deg,#29B6F6,#7B2FFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tube-lock-sub{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.tube-progress-wrap{background:rgba(255,255,255,.07);border-radius:6px;height:8px;overflow:hidden;margin-bottom:8px}
.tube-progress-bar{height:100%;background:linear-gradient(90deg,#0288d1,#29B6F6);border-radius:6px;transition:width .5s ease}
.tube-progress-label{font-size:11px;color:var(--muted);text-align:right;margin-bottom:14px}
.tube-perks{text-align:left;margin-bottom:16px}
.tube-perk{font-size:12px;color:rgba(240,240,240,.75);display:flex;align-items:center;gap:6px;margin-bottom:5px}
.tube-unlocked{padding:20px;text-align:center}
.tube-unlocked-icon{font-size:40px;margin-bottom:10px}
.tube-unlocked-title{font-size:17px;font-weight:800;color:#29B6F6;margin-bottom:8px}
.tube-code-box{background:rgba(41,182,246,.1);border:1px solid rgba(41,182,246,.3);border-radius:10px;padding:12px;margin-bottom:12px}
.tube-code{font-size:20px;font-weight:900;color:#29B6F6;letter-spacing:.12em;font-family:monospace}
.tube-code-label{font-size:11px;color:var(--muted);margin-top:4px}
.tube-claim-btn{display:block;width:100%;background:linear-gradient(90deg,#0288d1,#29B6F6);color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;text-align:center}
.tube-claimed-note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5}

/* ── Leaderboard ── */
.lb-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.lb-rank{font-size:18px;font-weight:900;width:28px;flex-shrink:0;text-align:center}
.lb-rank.gold{color:#FFD700}
.lb-rank.silver{color:#C0C0C0}
.lb-rank.bronze{color:#CD7F32}
.lb-name{flex:1;font-size:14px;font-weight:700}
.lb-coins{font-size:13px;font-weight:800;color:var(--gold)}
.lb-you{border-color:rgba(245,166,35,.5);background:rgba(245,166,35,.06)}

/* ── Article view overlay ── */
.article-view{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto}
.article-view.open{display:block}
.av-header{position:sticky;top:0;background:rgba(15,15,19,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px}
.av-back{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 12px;font-size:14px;cursor:pointer}
.av-title-short{font-size:15px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.av-img{width:100%;max-height:240px;object-fit:cover;display:block}
.av-body{padding:20px 16px 80px}
.av-tag{display:inline-block;background:var(--tag-bg);color:var(--tag-color);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:12px}
.av-h1{font-size:22px;font-weight:800;line-height:1.3;margin-bottom:16px;letter-spacing:-.02em}
.av-excerpt{font-size:15px;color:rgba(240,240,240,.8);line-height:1.7;margin-bottom:24px}
.av-cta{display:block;background:var(--accent);color:#fff;text-align:center;text-decoration:none;padding:14px;border-radius:12px;font-size:16px;font-weight:700;margin-bottom:12px}
.av-earn{display:block;background:rgba(245,166,35,.15);color:var(--gold);text-align:center;border:1px solid rgba(245,166,35,.3);padding:12px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px}
.av-share{display:block;background:var(--card);color:var(--text);text-align:center;border:1px solid var(--border);padding:12px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}

/* ── Reward banner ── */
.reward-banner{background:linear-gradient(135deg,rgba(123,47,255,.2),rgba(255,45,85,.2));border:1px solid rgba(123,47,255,.4);border-radius:16px;padding:16px;text-align:center;animation:fadeIn .3s ease}
.rb-icon{font-size:28px;margin-bottom:8px}
.rb-title{font-size:15px;font-weight:700;margin-bottom:4px}
.rb-sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.rb-btn{background:linear-gradient(90deg,var(--accent2),var(--accent));color:#fff;border:none;border-radius:20px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer}

/* ── Spinner ── */
.spinner{display:flex;justify-content:center;padding:48px}
.spinner-ring{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>

<div class="coin-toast" id="coinToast"></div>

<!-- Article view overlay -->
<div class="article-view" id="articleView">
  <div class="av-header">
    <button class="av-back" onclick="closeArticle()">← Back</button>

<!-- Main app -->
<div id="mainApp">

      <div class="logo-icon">⚡</div>

        <div class="logo-text">ScaleUp AI</div>
        <div class="logo-sub">AI Tools &amp; Strategies</div>

    </div>

      <span class="coins-icon">🪙</span>

  <!-- Articles page -->
  <div class="page active" id="pageArticles">

    <div class="cats" id="cats">
      <div class="cat active" data-cat="all">All</div>
      <div class="cat" data-cat="AI Tools">AI Tools</div>

      <p>Courses, tools &amp; affiliate programs by Osoba Kehinde</p>

  </div>

  <!-- Rewards page -->
  <div class="page rewards-page" id="pageRewards">
    <div class="rw-hero">
      <div class="rw-coins-display" id="rwCoinsDisplay">0</div>
      <div class="rw-coins-label">🪙 Total Coins Earned</div>
      <div class="rw-progress-wrap">
        <div class="rw-progress-bar" id="rwProgressBar" style="width:0%"></div>

      <span class="ni">💰</span>Earn

      <span class="ni">🏆</span>Rewards
    </div>

      <span class="ni">📤</span>Share
    </div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const WP_API  = 'https://scaleupai.online/wp-json/wp/v2/posts?_embed&per_page=12&orderby=date&order=desc&status=publish';
const BOT_URL = 'https://t.me/ScaleupAI_bot';
const TUBE_THRESHOLD = 1000;
const OWNER_TG = 'osobakehinde'; // DM target for TubeStack claim

// ── Persistent state (localStorage) ────────────────────────────────────────

function loadState() {
  try { return JSON.parse(localStorage.getItem('scaleup_v2') || '{}'); } catch(e) { return {}; }
}
function saveState(s) { localStorage.setItem('scaleup_v2', JSON.stringify(s)); }

let S = loadState();
if (!S.coins)       S.coins       = 0;
if (!S.streak)      S.streak      = 0;
if (!S.lastCheckin) S.lastCheckin = null;
if (!S.lastRead)    S.lastRead    = {};
if (!S.articlesRead) S.articlesRead = 0;
if (!S.claimed)     S.claimed     = false;
if (!S.claimCode)   S.claimCode   = null;
if (!S.uid) {
  // Stable ID: Telegram user ID if available, else random
  const tgId = tg?.initDataUnsafe?.user?.id;
  S.uid = tgId ? `TG${tgId}` : `U${Math.random().toString(36).slice(2,8).toUpperCase()}`;
}
saveState(S);

// ── Coin system ─────────────────────────────────────────────────────────────

function addCoins(n, label) {
  S.coins += n;
  saveState(S);
  updateCoinsUI();
  showToast(`+${n} 🪙 ${label}`);
}

function showToast(msg) {
  const t = document.getElementById('coinToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function updateCoinsUI() {
  document.getElementById('headerCoins').textContent = S.coins.toLocaleString();
  const rwDisp = document.getElementById('rwCoinsDisplay');
  if (rwDisp) rwDisp.textContent = S.coins.toLocaleString();
  const pct = Math.min(100, (S.coins / TUBE_THRESHOLD) * 100);
  const bar = document.getElementById('rwProgressBar');

// ── Daily check-in ──────────────────────────────────────────────────────────

function todayKey() { return new Date().toISOString().slice(0,10); }

function canCheckin() { return S.lastCheckin !== todayKey(); }

function doCheckin() {
  if (!canCheckin()) return;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yKey = yesterday.toISOString().slice(0,10);
  S.streak = (S.lastCheckin === yKey) ? S.streak + 1 : 1;
  S.lastCheckin = todayKey();
  const bonus = S.streak >= 7 ? 50 : 0;
  const earned = 10 + bonus;
  saveState(S);
  addCoins(earned, bonus ? `Check-in (+${bonus} streak bonus!)` : 'Daily check-in');
  renderCheckinStrip();
}

function renderCheckinStrip() {
  const el = document.getElementById('checkinStrip');
  if (!el) return;
  const done = !canCheckin();
  el.innerHTML = `
    <div class="checkin-strip">
      <div class="ci-left">
        <div class="ci-title">☀️ Daily Check-In</div>
        <div class="ci-sub">${done ? 'Done for today. Come back tomorrow!' : 'Earn 10 coins. Bonus 50 after 7-day streak.'}</div>
        ${S.streak > 0 ? `<div class="ci-streak">🔥 ${S.streak}-day streak</div>` : ''}
      </div>

}

// ── TubeStack reward card ────────────────────────────────────────────────────

function genCode() {
  if (S.claimCode) return S.claimCode;
  // Derive a verifiable code from uid + coins threshold
  const raw = (S.uid + TUBE_THRESHOLD + 'SCALEUP2024').split('').reduce((a,c) => a + c.charCodeAt(0), 0);
  const alpha = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'TUBE-';
  let seed = raw;
  for (let i = 0; i < 6; i++) { code += alpha[seed % alpha.length]; seed = Math.floor(seed / alpha.length) + (seed * 31); }
  S.claimCode = code;
  saveState(S);
  return code;
}

function renderTubeCard() {
  const slot = document.getElementById('tubeCardSlot');
  if (!slot) return;
  const pct = Math.min(100, (S.coins / TUBE_THRESHOLD) * 100);

  const unlocked = S.coins >= TUBE_THRESHOLD;

  if (!unlocked) {

          <div class="tube-lock-icon">🔒</div>
          <div class="tube-lock-title">TubeStack — 53 YouTube AI Tools</div>

          <div class="tube-progress-wrap"><div class="tube-progress-bar" style="width:${pct}%"></div></div>
          <div class="tube-progress-label">${S.coins} / 1,000 coins — ${remaining} more to go</div>
          <div class="tube-perks">
            ${['AI Script Generator','Voice-Over Studio (Nigerian, British, US, AU accents)','NicheFinder — CPM & competition data','SEOFlow — titles, tags, descriptions','A/B Title Tester','+ 48 more tools'].map(p=>`<div class="tube-perk">✅ ${p}</div>`).join('')}
          </div>
        </div>
      </div>`;
  } else {
    const code = genCode();
    slot.innerHTML = `
      <div class="tube-card">
        <div class="tube-unlocked">
          <div class="tube-unlocked-icon">🎉</div>
          <div class="tube-unlocked-title">You unlocked TubeStack!</div>
          <div class="tube-code-box">

          </div>

          <div class="tube-claimed-note">${S.claimed ? 'Your code has been sent. You\'ll receive access from @osobakehinde on Telegram.' : 'Tap to DM your code to @osobakehinde on Telegram. You\'ll receive free access within 24 hours.'}</div>
        </div>
      </div>`;
  }
}

// ── Helpers ─────────────────────────────────────────────────────────────────

function inferCategory(title) {
  const t = title.toLowerCase();
  if (t.includes('shopif')||t.includes('ecomm')||t.includes('store')) return 'Ecommerce';
  if (t.includes('market')||t.includes('social')||t.includes('content')) return 'Marketing';
  if (t.includes('seo')||t.includes('blog')||t.includes('keyword')) return 'SEO';
  if (t.includes('business')||t.includes('startup')) return 'AI Business';
  return 'AI Tools';
}
function stripHtml(h) { return (h||'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&nbsp;/g,' ').replace(/&#\d+;/g,'').trim(); }
function timeAgo(d) {
  const s=(Date.now()-new Date(d))/1000;
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function renderFeed(posts) {
  const feed=document.getElementById('feed');
  if (!posts.length) { feed.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>No articles yet.</p></div>'; return; }

  posts.forEach((post,i) => {
    const title   = stripHtml(post.title.rendered);
    const excerpt = stripHtml(post.excerpt.rendered).substring(0,120);
    const img     = post._embedded?.['wp:featuredmedia']?.[0]?.source_url||'';
    const cat     = inferCategory(title);
    const date    = timeAgo(post.date);
    if (i>0 && i%3===0) feed.appendChild(makeRewardBanner());
    if (i>0 && i%PROMO_EVERY===0) feed.appendChild(makePromoCard());
    const card=document.createElement('div');
    card.className='card'+(i===0?' featured':'');
    card.innerHTML=`
      ${img?`<img class="card-img" src="${img}" alt="" loading="lazy" onerror="this.style.display='none'">`:''}
      <div class="card-body">
        <span class="card-tag">${cat}</span>
        <div class="card-title">${title}</div>
        <div class="card-excerpt">${excerpt}</div>
        <div class="card-meta"><span class="card-date">${date}</span><button class="read-btn">Read →</button></div>
      </div>`;
    card.addEventListener('click',()=>openArticle(post));
    feed.appendChild(card);
  });
}

  document.getElementById('avTitle').textContent      = title;
  document.getElementById('avExcerpt').textContent    = excerpt;
  document.getElementById('avTag').textContent        = cat;
  document.getElementById('avCta').href               = post.link;
  const avImg=document.getElementById('avImg');

  document.getElementById('articleView').classList.add('open');
  tg?.BackButton?.show?.();
  tg?.BackButton?.onClick?.(()=>closeArticle());

  // Coins for reading (up to 5 per day, 1 per unique article)

    S.lastRead[post.id] = dayKey;
    S.articlesRead++;
    saveState(S);
    addCoins(5,'Article read');
  }
}

function closeArticle() {
